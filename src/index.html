<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aplikasi berbagi cerita dengan peta interaktif" />

    <link rel="shortcut icon" href="/favicon.png" />
    <title>App</title>

    <script type="module" src="/scripts/index.js"></script>
  </head>

  <body>
    <!-- ✅ SKIP TO CONTENT (ADVANCE) -->
    <a href="#main-content" class="skip-link">
      Lewati ke konten utama
    </a>

    <!-- ✅ HEADER -->
    <header>
      <div class="main-header container">
        <a class="brand-name" href="#/">App</a>

        <!-- ✅ NAVIGATION -->
        <nav 
          id="navigation-drawer" 
          class="navigation-drawer"
          aria-label="Navigasi utama"
        >
          <ul id="nav-list" class="nav-list">
            <li><a href="#/">Beranda</a></li>
            <li><a href="#/about">About</a></li>
            <li><a href="#/add">Tambah Data</a></li>
          </ul>
        </nav>

        <!-- ✅ DRAWER BUTTON (ACCESSIBLE) -->
        <button 
          id="drawer-button" 
          class="drawer-button"
          aria-label="Buka menu navigasi"
          aria-expanded="false"
          aria-controls="navigation-drawer"
        >
          ☰
        </button>
      </div>
    </header>

    <!-- ✅ MAIN CONTENT -->
    <main id="main-content" class="main-content" tabindex="-1"></main>

    <!-- ✅ FOOTER (SEMANTIC BONUS) -->
    <footer>
      <p style="text-align:center; padding:16px;">
        © 2026 App
      </p>
    </footer>
  </body>
</html>
