<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aplikasi berbagi cerita dengan peta interaktif" />

    <link rel="shortcut icon" href="/favicon.png" />
    <title>App</title>

    <script type="module" src="./scripts/index.js"></script>
  </head>

  <body>

    <header>

        <a class="brand-name" href="#/">App</a>

        <nav 
          id="navigation-drawer" 
          class="navigation-drawer"
          aria-label="Navigasi utama"
        >
          <ul id="nav-list" class="nav-list">

            <li><a href="#/about">About</a></li>

          aria-controls="navigation-drawer"

          ☰

    <main id="main-content" class="main-content" tabindex="-1"></main>

    <div id="global-loader" class="loader hidden">

    <footer>
